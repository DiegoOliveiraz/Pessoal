<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Do Caos à Clareza - Apresentação FastWork</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
        overflow: hidden;
        height: 100vh;
      }

      .presentation-container {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #000000;
      }

      .slide-content {
        flex: 1;
        position: relative;
        overflow: auto;
      }

      .slide {
        width: 100%;
        height: 100%;
        padding: 3rem;
        display: none;
      }

      .slide.active {
        display: flex;
      }

      /* Slide Cover */
      .slide-cover {
        background: linear-gradient(to bottom right, #000000, #1976d2, #000000);
        color: white;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .slide-cover h1 {
        font-size: 3.75rem;
        font-weight: bold;
        margin-bottom: 1.5rem;
      }

      .slide-cover h2 {
        font-size: 1.875rem;
        margin-bottom: 1rem;
        opacity: 0.9;
      }

      .slide-cover p {
        font-size: 1.25rem;
        opacity: 0.8;
      }

      /* Slide Content */
      .slide-content-type {
        background: linear-gradient(to bottom right, #000000, #0d47a1);
        color: white;
        flex-direction: column;
      }

      .slide-header {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .slide-icon {
        width: 3rem;
        height: 3rem;
        color: #1976d2;
      }

      .slide-content-type h2 {
        font-size: 3rem;
        font-weight: bold;
      }

      .content-list {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .content-list ul {
        list-style: none;
      }

      .content-list li {
        display: flex;
        align-items: start;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .bullet {
        width: 0.75rem;
        height: 0.75rem;
        background: #1976d2;
        border-radius: 50%;
        margin-top: 0.5rem;
        flex-shrink: 0;
      }

      .content-list li span {
        font-size: 1.5rem;
        color: #e5e7eb;
      }

      .highlight-box {
        margin-top: 3rem;
        padding: 1.5rem;
        background: rgba(30, 58, 138, 0.5);
        border-left: 4px solid #60a5fa;
        border-radius: 0.5rem;
      }

      .highlight-box p {
        font-size: 1.5rem;
        font-weight: 600;
        color: #dbeafe;
      }

      /* Persona Slide */
      .slide-persona {
        background: linear-gradient(to bottom right, #000000, #1976d2);
        color: white;
        flex-direction: column;
      }

      .persona-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        height: 75%;
      }

      .persona-card {
        background: rgba(31, 41, 55, 0.5);
        backdrop-filter: blur(10px);
        border-radius: 1rem;
        padding: 2rem;
        border: 1px solid #3b82f6;
      }

      .persona-header {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .persona-avatar {
        width: 5rem;
        height: 5rem;
        background: linear-gradient(to bottom right, #3b82f6, #a855f7);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
      }

      .persona-name {
        font-size: 1.875rem;
        font-weight: bold;
      }

      .persona-role {
        font-size: 1.25rem;
        color: #d1d5db;
      }

      .persona-quote {
        background: rgba(234, 179, 8, 0.2);
        padding: 1rem;
        border-radius: 0.5rem;
        border-left: 4px solid #fbbf24;
        margin-top: 1.5rem;
      }

      .persona-quote p {
        font-size: 1.25rem;
        font-style: italic;
      }

      .persona-section {
        background: rgba(31, 41, 55, 0.5);
        backdrop-filter: blur(10px);
        border-radius: 0.75rem;
        padding: 1.5rem;
        margin-bottom: 1rem;
      }

      .persona-section.goals {
        border: 1px solid #10b981;
      }

      .persona-section.pains {
        border: 1px solid #ef4444;
      }

      .persona-section h4 {
        font-size: 1.5rem;
        font-weight: bold;
        margin-bottom: 0.75rem;
      }

      .persona-section.goals h4 {
        color: #34d399;
      }

      .persona-section.pains h4 {
        color: #f87171;
      }

      .persona-section ul {
        list-style: none;
      }

      .persona-section li {
        display: flex;
        align-items: start;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }

      .check-icon,
      .pain-dot {
        width: 1.25rem;
        height: 1.25rem;
        flex-shrink: 0;
        margin-top: 0.25rem;
      }

      .check-icon {
        color: #34d399;
      }

      .pain-dot {
        background: #ef4444;
        border-radius: 50%;
      }

      /* Journey Slide */
      .slide-journey {
        background: linear-gradient(to bottom right, #000000, #0d47a1);
        color: white;
        flex-direction: column;
      }

      .journey-steps {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 1rem;
      }

      .journey-step {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
      }

      .journey-emoji {
        width: 5rem;
        height: 5rem;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        margin-bottom: 1rem;
      }

      .journey-emoji.success {
        background: #16a34a;
      }

      .journey-emoji.opportunity {
        background: #2563eb;
      }

      .journey-emoji.neutral {
        background: #4b5563;
      }

      .journey-step h3 {
        font-size: 1.25rem;
        font-weight: bold;
        margin-bottom: 0.5rem;
      }

      .journey-step p {
        text-align: center;
        color: #d1d5db;
        font-size: 0.875rem;
      }

      /* Card Sorting */
      .slide-cardsorting {
        background: linear-gradient(to bottom right, #000000, #1976d2);
        color: white;
        flex-direction: column;
        overflow: auto;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        margin-bottom: 1.5rem;
        max-height: calc(100vh - 300px);
        overflow-y: auto;
      }
      .card-category {
        border-radius: 0.75rem;
        padding: 1rem;
      }

      .card-category h3 {
        font-size: 1.25rem;
        font-weight: bold;
        margin-bottom: 0.75rem;
      }

      .card-item {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        border-radius: 0.25rem;
        padding: 0.5rem;
        font-size: 0.875rem;
        margin-bottom: 0.5rem;
      }

      .insight-box {
        margin-top: 1.5rem;
        padding: 1rem;
        background: rgba(59, 130, 246, 0.3);
        border-left: 4px solid #60a5fa;
        border-radius: 0.5rem;
      }

      .insight-box p {
        font-size: 1.125rem;
        font-weight: 600;
      }

      /* Colors Slide */
      .slide-colors {
        background: linear-gradient(to bottom right, #000000, #0d47a1);
        color: white;
        flex-direction: column;
      }

      .color-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1.5rem;
      }

      .color-item {
        background: rgba(31, 41, 55, 0.5);
        backdrop-filter: blur(10px);
        border-radius: 0.75rem;
        padding: 1.5rem;
        border: 1px solid #374151;
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }

      .color-swatch {
        width: 6rem;
        height: 6rem;
        border-radius: 0.75rem;
        border: 2px solid #4b5563;
      }

      .color-info h3 {
        font-size: 1.5rem;
        font-weight: bold;
        margin-bottom: 0.25rem;
      }

      .color-code {
        color: #9ca3af;
        font-family: monospace;
        margin-bottom: 0.5rem;
      }

      .color-use {
        color: #d1d5db;
      }

      /* Accessibility Slide */
      .slide-accessibility {
        background: linear-gradient(to bottom right, #000000, #1976d2);
        color: white;
        flex-direction: column;
        overflow: auto;
      }

      .accessibility-checks {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .check-item {
        background: rgba(31, 41, 55, 0.5);
        backdrop-filter: blur(10px);
        border-radius: 0.75rem;
        padding: 1rem;
        display: flex;
        align-items: start;
        gap: 1rem;
      }

      .check-item.ok {
        border-left: 4px solid #10b981;
      }

      .check-item.improved {
        border-left: 4px solid #eab308;
      }

      .check-item-icon {
        width: 2rem;
        height: 2rem;
        flex-shrink: 0;
      }

      .check-item-icon.ok {
        color: #34d399;
      }

      .check-item-icon.improved {
        color: #facc15;
      }

      .check-item-content {
        flex: 1;
      }

      .check-item-content h3 {
        font-size: 1.25rem;
        font-weight: bold;
        margin-bottom: 0.25rem;
      }

      .check-item-content p {
        color: #d1d5db;
      }

      .check-status {
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.875rem;
        font-weight: 600;
      }

      .check-status.ok {
        background: #16a34a;
      }

      .check-status.improved {
        background: #ca8a04;
      }

      /* Navigation Controls */
      .controls {
        background: #000000;
        padding: 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid #1976d2;
      }

      .nav-button {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        background: #1976d2;
        color: white;
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
        font-size: 1rem;
        transition: background 0.3s;
      }

      .nav-button:hover:not(:disabled) {
        background: #1565c0;
      }

      .nav-button:disabled {
        background: #374151;
        cursor: not-allowed;
      }

      .progress-info {
        display: flex;
        align-items: center;
        gap: 1rem;
        color: white;
      }

      .progress-info span {
        font-size: 1.125rem;
      }

      .progress-dots {
        display: flex;
        gap: 0.25rem;
      }

      .progress-dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: #4b5563;
        transition: all 0.3s;
      }

      .progress-dot.active {
        background: #1976d2;
        width: 2rem;
      }

      /* Heuristics Slide */
      .heuristics-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1.5rem;
      }

      .heuristic-item {
        background: rgba(31, 41, 55, 0.5);
        backdrop-filter: blur(10px);
        border-radius: 0.75rem;
        padding: 1.5rem;
        border: 1px solid #3b82f6;
      }

      .heuristic-item h3 {
        font-size: 1.5rem;
        font-weight: bold;
        color: #60a5fa;
        margin-bottom: 0.75rem;
      }

      .heuristic-item p {
        color: #e5e7eb;
        font-size: 1.125rem;
      }

      /* Navigation Flow */
      .flow-list {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .flow-item {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        background: rgba(31, 41, 55, 0.5);
        backdrop-filter: blur(10px);
        border-radius: 0.75rem;
        padding: 1.5rem;
      }

      .flow-from {
        flex: 1;
        font-size: 1.25rem;
        font-weight: 600;
        color: #93c5fd;
      }

      .flow-arrow {
        font-size: 1.875rem;
      }

      .flow-to {
        flex: 1;
        font-size: 1.25rem;
        font-weight: 600;
        color: #86efac;
      }

      .flow-clicks {
        background: #2563eb;
        padding: 0.5rem 1rem;
        border-radius: 9999px;
        font-weight: bold;
      }

      /* Prototype Slide */
      .prototype-quote {
        background: rgba(30, 58, 138, 0.3);
        padding: 1.5rem;
        border-radius: 0.75rem;
        border-left: 4px solid #60a5fa;
        margin-bottom: 2rem;
      }

      .prototype-quote p {
        font-size: 1.5rem;
        font-style: italic;
      }

      .benefits-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1.5rem;
        margin-bottom: 2rem;
      }

      .benefit-item {
        background: rgba(31, 41, 55, 0.5);
        backdrop-filter: blur(10px);
        border-radius: 0.75rem;
        padding: 1.5rem;
        display: flex;
        align-items: start;
        gap: 1rem;
      }

      .benefit-icon {
        width: 2rem;
        height: 2rem;
        color: #facc15;
        flex-shrink: 0;
      }

      .benefit-text {
        font-size: 1.125rem;
        color: #e5e7eb;
      }

      /* Narrative boxes */
      .narrative-box {
        background: rgba(25, 118, 210, 0.1);
        padding: 1.5rem;
        border-left: 4px solid #1976d2;
        border-radius: 0.5rem;
        margin-bottom: 2rem;
      }

      .narrative-box p {
        font-size: 1.125rem;
        line-height: 1.8;
        color: #e5e7eb;
      }

      .narrative-box strong {
        color: #60a5fa;
      }

      .info-grid-2x2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .info-card {
        background: rgba(31, 41, 55, 0.5);
        border-radius: 0.75rem;
        padding: 1rem;
        border: 1px solid #1976d2;
      }

      .info-card h3 {
        color: #60a5fa;
        font-size: 1.25rem;
        margin-bottom: 0.5rem;
      }

      .info-card p {
        color: #d1d5db;
        font-size: 0.95rem;
      }

      .impact-badge {
        text-align: center;
      }

      .impact-badge div {
        display: inline-block;
        background: linear-gradient(to right, #16a34a, #2563eb);
        color: white;
        padding: 1rem 2rem;
        border-radius: 9999px;
        font-size: 1.5rem;
        font-weight: bold;
      }

      /* Result Slide */
      .result-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 2rem;
      }

      .result-section h3 {
        font-size: 1.875rem;
        font-weight: bold;
        color: #60a5fa;
        margin-bottom: 1.5rem;
      }

      .features-list {
        list-style: none;
      }

      .features-list li {
        display: flex;
        align-items: start;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .feature-check {
        width: 1.5rem;
        height: 1.5rem;
        color: #34d399;
        flex-shrink: 0;
        margin-top: 0.25rem;
      }

      .feature-text {
        font-size: 1.125rem;
        color: #e5e7eb;
      }

      .metrics-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .metric-item {
        background: rgba(31, 41, 55, 0.5);
        backdrop-filter: blur(10px);
        border-radius: 0.75rem;
        padding: 1.5rem;
        border: 1px solid #10b981;
      }

      .metric-value {
        font-size: 3rem;
        font-weight: bold;
        color: #34d399;
        margin-bottom: 0.5rem;
      }

      .metric-label {
        font-size: 1.25rem;
        color: #d1d5db;
      }

      /* Lessons Slide */
      .lessons-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .lesson-item {
        background: linear-gradient(
          to right,
          rgba(30, 58, 138, 0.5),
          rgba(88, 28, 135, 0.5)
        );
        backdrop-filter: blur(10px);
        border-radius: 0.75rem;
        padding: 1.5rem;
        border-left: 4px solid #3b82f6;
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .lesson-number {
        width: 3rem;
        height: 3rem;
        background: #2563eb;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        font-size: 1.25rem;
        flex-shrink: 0;
      }

      .lesson-text {
        font-size: 1.25rem;
        color: #f3f4f6;
        font-weight: 500;
      }

      /* Closing Slide */
      .slide-closing {
        background: linear-gradient(to bottom right, #000000, #1976d2, #000000);
        color: white;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .slide-closing h1 {
        font-size: 3.75rem;
        font-weight: bold;
        margin-bottom: 3rem;
      }

      .link-box {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 1rem;
        padding: 2rem;
        margin-bottom: 2rem;
        border: 1px solid #60a5fa;
      }

      .link-box p:first-child {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }

      .link-box p:last-child {
        font-size: 1.25rem;
        font-family: monospace;
        color: #93c5fd;
      }

      .slide-closing > p:last-child {
        font-size: 1.875rem;
      }

      /* Grid Slide */
      .grid-demo {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 75%;
      }

      .grid-container {
        width: 100%;
        max-width: 64rem;
      }

      .grid-visual {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 0.5rem;
        margin-bottom: 2rem;
      }

      .grid-col {
        height: 8rem;
        background: rgba(37, 99, 235, 0.3);
        border: 1px solid #60a5fa;
        border-radius: 0.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.875rem;
      }

      .grid-info {
        text-align: center;
      }

      .grid-info p:first-child {
        font-size: 1.5rem;
        color: #e5e7eb;
        margin-bottom: 1rem;
      }

      .grid-info p:last-child {
        font-size: 1.25rem;
        color: #60a5fa;
      }

      /* Typography Slide */
      .typography-list {
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }

      .typography-item {
        background: rgba(31, 41, 55, 0.5);
        backdrop-filter: blur(10px);
        border-radius: 0.75rem;
        padding: 1.5rem;
        border: 1px solid #3b82f6;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
      }

      .typography-specs {
        color: #d1d5db;
      }

      .typography-level {
        color: #60a5fa;
        font-weight: bold;
        margin-bottom: 0.5rem;
      }

      .typography-sample {
        display: flex;
        align-items: center;
      }

      /* Canvas Slide */
      .canvas-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1.5rem;
      }

      .canvas-item {
        border-radius: 1rem;
        padding: 2rem;
        border: 1px solid;
      }

      .canvas-item.blue {
        background: linear-gradient(to bottom right, #1e3a8a, #1e40af);
        border-color: #3b82f6;
      }

      .canvas-item.purple {
        background: linear-gradient(to bottom right, #581c87, #6b21a8);
        border-color: #a855f7;
      }

      .canvas-item.green {
        background: linear-gradient(to bottom right, #14532d, #166534);
        border-color: #10b981;
      }

      .canvas-item.orange {
        background: linear-gradient(to bottom right, #7c2d12, #9a3412);
        border-color: #f97316;
      }

      .canvas-item h3 {
        font-size: 1.5rem;
        font-weight: bold;
        margin-bottom: 1rem;
      }

      .canvas-item.blue h3 {
        color: #93c5fd;
      }
      .canvas-item.purple h3 {
        color: #d8b4fe;
      }
      .canvas-item.green h3 {
        color: #86efac;
      }
      .canvas-item.orange h3 {
        color: #fdba74;
      }

      .canvas-item p {
        font-size: 1.25rem;
        color: #e5e7eb;
      }

      /* SVG Icons */
      .icon-svg {
        display: inline-block;
        vertical-align: middle;
      }

      @media (max-width: 1024px) {
        .slide {
          padding: 2rem;
        }
        .slide-cover h1,
        .slide-closing h1 {
          font-size: 2.5rem;
        }
        .persona-grid,
        .result-grid,
        .benefits-grid,
        .heuristics-grid,
        .canvas-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="presentation-container">
      <div class="slide-content" id="slideContainer"></div>

      <div class="controls">
        <button class="nav-button" id="prevBtn" onclick="prevSlide()">
          <svg
            class="icon-svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"

      function renderSlides() {
        const container = document.getElementById("slideContainer");
        container.innerHTML = slides
          .map((slide, index) =>
            slide().replace(
              'class="slide active',
              `class="slide${index === 0 ? " active" : ""}`
            )
          )
          .join("");
      }

      function renderProgressDots() {
        const dotsContainer = document.getElementById("progressDots");
        dotsContainer.innerHTML = Array.from(
          { length: totalSlides },
          (_, i) =>
            `<div class="progress-dot${i === 0 ? " active" : ""}"></div>`
        ).join("");
      }

      function updateSlide() {
        const slides = document.querySelectorAll(".slide");
        const dots = document.querySelectorAll(".progress-dot");

        slides.forEach((slide, index) => {
          slide.classList.toggle("active", index === currentSlide);
        });

        dots.forEach((dot, index) => {
          dot.classList.toggle("active", index === currentSlide);
        });

        document.getElementById("slideCounter").textContent = `Slide ${
          currentSlide + 1
        } de ${totalSlides}`;
        document.getElementById("prevBtn").disabled = currentSlide === 0;
        document.getElementById("nextBtn").disabled =
          currentSlide === totalSlides - 1;
      }

      function nextSlide() {
        if (currentSlide < totalSlides - 1) {
          currentSlide++;
          updateSlide();
        }
      }

      function prevSlide() {
        if (currentSlide > 0) {
          currentSlide--;
          updateSlide();
        }
      }

      // Keyboard navigation
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") nextSlide();
        if (e.key === "ArrowLeft") prevSlide();
      });

      // Initialize
      renderSlides();
      renderProgressDots();
      updateSlide();
    </script>
