<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Endereço Inteligente - Consulta CEP</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
      }

      h1 {
        color: #667eea;
        text-align: center;
        margin-bottom: 10px;
        font-size: 2rem;
      }

      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
        font-size: 0.9rem;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 600;
        font-size: 0.9rem;
      }

      input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      input:disabled {
        background-color: #f5f5f5;
        cursor: not-allowed;
      }

      .cep-group {
        position: relative;
      }

      .btn-buscar {
        margin-top: 10px;
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .btn-buscar:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      }

      .btn-buscar:active {
        transform: translateY(0);
      }

      .btn-buscar:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      .loading {
        display: none;
        text-align: center;
        color: #667eea;
        font-weight: 600;
        margin: 15px 0;
      }

      .loading.active {
        display: block;
      }

      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .message {
        padding: 12px;
        border-radius: 8px;
        margin: 15px 0;
        display: none;
        font-size: 0.9rem;
      }

      .message.active {
        display: block;
      }

      .message.error {
        background-color: #fee;
        color: #c33;
        border: 1px solid #fcc;
      }

      .message.success {
        background-color: #efe;
        color: #3c3;
        border: 1px solid #cfc;
      }

      .row {
        display: grid;
        grid-template-columns: 3fr 1fr;
        gap: 15px;
      }

      .footer {
        text-align: center;
        margin-top: 30px;
        color: #666;
        font-size: 0.85rem;
      }

      .footer a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
      }

      .footer a:hover {
        text-decoration: underline;
      }

      @media (max-width: 600px) {
        .container {
          padding: 25px;
        }

        h1 {
          font-size: 1.5rem;
        }

        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📍 Endereço Inteligente</h1>
      <p class="subtitle">Consulta automática de endereço via CEP</p>

      <form id="formEndereco">
        <div class="form-group cep-group">
          <label for="cep">CEP <span style="color: #c33">*</span></label>
          <input
            type="text"
            id="cep"
            name="cep"
            placeholder="00000-000"
            maxlength="9"
            required
          />
          <button type="button" class="btn-buscar" id="btnBuscar">
            🔍 Buscar CEP
          </button>
        </div>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          Consultando CEP...
        </div>

        <div class="message" id="message"></div>

        <div class="form-group">
          <label for="logradouro">Logradouro</label>
          <input
            type="text"
            id="logradouro"
            name="logradouro"
            placeholder="Rua, Avenida, etc."
            disabled
          />
        </div>

        <div class="form-group">
          <label for="numero">Número</label>
          <input type="text" id="numero" name="numero" placeholder="Nº" />
        </div>

        <div class="form-group">
          <label for="complemento">Complemento</label>
          <input
            type="text"
            id="complemento"
            name="complemento"
            placeholder="Apto, Bloco, etc."
          />
        </div>

        <div class="form-group">
          <label for="bairro">Bairro</label>
          <input
            type="text"
            id="bairro"
            name="bairro"
            placeholder="Bairro"
            disabled
          />
        </div>

        <div class="row">
          <div class="form-group">
            <label for="cidade">Cidade</label>
            <input
              type="text"
              id="cidade"
              name="cidade"
              placeholder="Cidade"
              disabled
            />
          </div>

          <div class="form-group">
            <label for="uf">UF</label>
            <input
              type="text"
              id="uf"
              name="uf"
              placeholder="UF"
              maxlength="2"
              disabled
            />
          </div>
        </div>
      </form>

      <div class="footer">
        Powered by <a href="https://viacep.com.br/" target="_blank">ViaCEP</a>
      </div>
    </div>

    <script src="ArquivoJS/consultadecep.js"></script>
  </body>
</html>
